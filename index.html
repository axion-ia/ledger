<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ledger</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #f5f3ef;
  font-family: 'IBM Plex Mono', monospace;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.container {
  text-align: center;
}

.logo {
  font-size: 48px;
  font-weight: 600;
  color: #1a3a2a;
  letter-spacing: -0.03em;
  margin-bottom: 8px;
}

.tagline {
  font-size: 12px;
  color: #a09a93;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 3rem;
}

.btn-enter {
  display: inline-block;
  padding: 14px 48px;
  background: #1a3a2a;
  color: #fff;
  font-size: 13px;
  font-family: 'IBM Plex Mono', monospace;
  font-weight: 600;
  letter-spacing: 0.04em;
  border-radius: 8px;
  text-decoration: none;
  transition: background 0.15s;
}

.btn-enter:hover {
  background: #2d5e42;
}
</style>
</head>
<body>
<div class="container">
  <div class="logo">Ledger</div>
  <div class="tagline">Gestão Diária</div>
  <a href="financeiro.html" class="btn-enter">Entrar</a>
</div>
</body>
</html>
